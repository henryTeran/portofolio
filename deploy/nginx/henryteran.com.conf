# Place `map` blocks in the global `http` context (nginx.conf)
map $arg_lang $lang_prefix {
    default "";
    ~*^fr$ "/fr";
    ~*^en$ "/en";
    ~*^es$ "/es";
}

map $uri $route_suffix {
    default "";
    ~^/$ "";
    ~^/services/?$ "/services";
    ~^/projects/?$ "/projects";
    ~^/contact/?$ "/contact";
}

map $args $query_without_lang {
    ~*^(?<left>.*)&lang=(?:fr|en|es)&(?<right>.*)$ $left&$right;
    ~*^lang=(?:fr|en|es)&(?<right>.*)$ $right;
    ~*^(?<left>.*)&lang=(?:fr|en|es)$ $left;
    ~*^lang=(?:fr|en|es)$ "";
    default $args;
}

map $query_without_lang $query_prefix {
    default "?";
    "" "";
}

# HTTP -> HTTPS and WWW -> non-WWW
server {
    listen 80;
    server_name henryteran.com www.henryteran.com;
    return 301 https://henryteran.com$request_uri;
}

# WWW -> non-WWW on HTTPS
server {
    listen 443 ssl http2;
    server_name www.henryteran.com;

    ssl_certificate     /etc/letsencrypt/live/henryteran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/henryteran.com/privkey.pem;

    return 301 https://henryteran.com$request_uri;
}

# Main website server
server {
    listen 443 ssl http2;
    server_name henryteran.com;

    ssl_certificate     /etc/letsencrypt/live/henryteran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/henryteran.com/privkey.pem;

    root /var/www/henryteran.com/dist;
    index index.html;

    # 301 migration from ?lang= to /fr|/en|/es (preserves other query params)
    set $do_lang_redirect 0;

    if ($lang_prefix != "") {
        set $do_lang_redirect 1;
    }

    if ($uri ~* ^/(fr|en|es)(/|$)) {
        set $do_lang_redirect 0;
    }

    if ($do_lang_redirect = 1) {
        if ($route_suffix = "") {
            return 301 https://henryteran.com$lang_prefix$query_prefix$query_without_lang;
        }

        return 301 https://henryteran.com$lang_prefix$route_suffix$query_prefix$query_without_lang;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
